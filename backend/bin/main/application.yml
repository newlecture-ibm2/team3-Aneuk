spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/Anook_db}
    username: ${SPRING_DATASOURCE_USERNAME:Anook_user}
    password: ${SPRING_DATASOURCE_PASSWORD:Anook_password}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080
