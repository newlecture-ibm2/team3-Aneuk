spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/anook_dev}
    username: ${SPRING_DATASOURCE_USERNAME:anook}
    password: ${SPRING_DATASOURCE_PASSWORD:anook1234}
    driver-class-name: org.postgresql.Driver

  sql:
    init:
      mode: always                # schema.sql, data.sql 항상 실행

  jpa:
    hibernate:
      ddl-auto: none              # SQL 스크립트로 스키마 관리 (Hibernate 자동 DDL 비활성화)
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080
