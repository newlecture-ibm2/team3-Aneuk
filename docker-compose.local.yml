version: '3.8'

services:
  # 로컬 개발용 PostgreSQL + pgvector
  db-local:
    image: pgvector/pgvector:pg16
    container_name: anook-db-local
    environment:
      POSTGRES_USER: Anook_user
      POSTGRES_PASSWORD: Anook_password
      POSTGRES_DB: Anook_db
    ports:
      - "5432:5432" # 로컬에서 GUI 툴로 접속 가능하도록 포트 개방
    volumes:
      - anook-db-local-data:/var/lib/postgresql/data
    networks:
      - anook-local-network

  # 백엔드 (로컬 개발 시에는 IDE에서 직접 실행하는 경우가 많지만, 컨테이너 환경 테스트용으로 포함)
  backend-local:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: anook-backend-local
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db-local:5432/Anook_db
      - SPRING_DATASOURCE_USERNAME=Anook_user
      - SPRING_DATASOURCE_PASSWORD=Anook_password
      - SPRING_PROFILES_ACTIVE=local
    depends_on:
      - db-local
    networks:
      - anook-local-network

networks:
  anook-local-network:
    driver: bridge

volumes:
  anook-db-local-data:
